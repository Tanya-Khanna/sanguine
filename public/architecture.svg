<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="arrO" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b45309"/></marker>
  </defs>

  <rect x="0" y="0" width="1240" height="900" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#0f172a">Sanguine — architecture</text>
  <text x="40" y="72" font-size="15" fill="#475569">Blood-unit allocation network · Next.js on Vercel · Amazon Aurora DSQL (strong consistency)</text>

  <!-- Users -->
  <rect x="460" y="92" width="320" height="64" rx="10" fill="#eef2f7" stroke="#cbd5e1"/>
  <text x="620" y="120" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Users</text>
  <text x="620" y="141" font-size="12" fill="#475569" text-anchor="middle">Clinicians · hospital supply teams · regional coordinators (browser)</text>

  <line x1="620" y1="156" x2="620" y2="194" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="632" y="180" font-size="11.5" fill="#475569">HTTPS</text>

  <!-- Vercel group -->
  <rect x="90" y="196" width="1060" height="252" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="7 5"/>
  <text x="110" y="222" font-size="15" font-weight="700" fill="#334155">▲ Vercel</text>
  <text x="186" y="222" font-size="12" fill="#64748b">front end + serverless API</text>

  <!-- Front end -->
  <rect x="120" y="240" width="470" height="120" rx="10" fill="#e8f0fe" stroke="#4f8cff"/>
  <text x="138" y="266" font-size="15" font-weight="700" fill="#0f172a">Next.js front end (App Router)</text>
  <text x="138" y="290" font-size="12.5" fill="#334155">Landing /  ·  Console /console</text>
  <text x="138" y="310" font-size="12.5" fill="#334155">Regional network /network  ·  Access /access</text>
  <text x="138" y="334" font-size="12" fill="#64748b" font-style="italic">Polls /api/state ~1s for live updates</text>

  <!-- API routes -->
  <rect x="650" y="240" width="470" height="120" rx="10" fill="#efe9fe" stroke="#8b5cf6"/>
  <text x="668" y="266" font-size="15" font-weight="700" fill="#0f172a">Next.js API routes (Node serverless)</text>
  <text x="668" y="289" font-size="11.5" fill="#334155">/api/intake · /api/allocate · /api/allocate-naive</text>
  <text x="668" y="307" font-size="11.5" fill="#334155">/api/surge · /api/state · /api/ledger</text>
  <text x="668" y="325" font-size="11.5" fill="#334155">/api/analytics · /api/discover · /api/confirm</text>
  <text x="668" y="343" font-size="11.5" fill="#334155">/api/reset · /api/sweep</text>

  <line x1="590" y1="298" x2="648" y2="298" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="619" y="291" font-size="11" fill="#475569" text-anchor="middle">fetch</text>

  <!-- Engine (spine) -->
  <rect x="120" y="378" width="1000" height="56" rx="10" fill="#ffe9ec" stroke="#ef4444" stroke-width="2"/>
  <text x="620" y="401" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Allocation engine — strong-consistency transaction (the spine)</text>
  <text x="620" y="420" font-size="11.5" fill="#475569" text-anchor="middle">FEFO + ABO/Rh match · version-checked claim · OCC conflict → retry → reroute · Sanguine (strong) vs legacy (naïve) paths</text>

  <line x1="885" y1="360" x2="885" y2="376" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- AWS group -->
  <rect x="90" y="486" width="1060" height="340" rx="14" fill="#fffaf3" stroke="#f59e0b" stroke-dasharray="7 5"/>
  <text x="110" y="512" font-size="15" font-weight="700" fill="#b45309">AWS · us-east-1</text>

  <!-- Bedrock -->
  <rect x="120" y="536" width="430" height="120" rx="10" fill="#e7f7ef" stroke="#10b981"/>
  <text x="138" y="563" font-size="15" font-weight="700" fill="#0f172a">Amazon Bedrock</text>
  <text x="138" y="585" font-size="12.5" fill="#334155">Claude Haiku 4.5 (intake agent)</text>
  <text x="138" y="609" font-size="12" fill="#475569">Parses plain-English requests into</text>
  <text x="138" y="627" font-size="12" fill="#475569">structured orders {blood_type, units, deadline}</text>

  <!-- Aurora DSQL (hero) -->
  <rect x="600" y="520" width="520" height="186" rx="12" fill="#fff4e6" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="620" y="552" font-size="17" font-weight="700" fill="#0f172a">Amazon Aurora DSQL</text>
  <text x="620" y="573" font-size="12.5" fill="#475569">Distributed SQL · primary data store · strong consistency (OCC)</text>
  <text x="620" y="599" font-size="12.5" font-weight="700" fill="#334155">Tables</text>
  <text x="620" y="617" font-size="12" fill="#334155">blood_units (version token) · requests</text>
  <text x="620" y="635" font-size="12" fill="#334155">allocations (PK unit_id ← cannot double-allocate)</text>
  <text x="620" y="653" font-size="12" fill="#334155">naive_allocations (unconstrained) · custody_events (audit log)</text>
  <text x="620" y="679" font-size="11.5" font-style="italic" fill="#64748b">Authoritative row + unique PK = the same unit can't be promised twice</text>

  <!-- IAM -->
  <rect x="120" y="700" width="430" height="74" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="138" y="725" font-size="15" font-weight="700" fill="#0f172a">AWS IAM</text>
  <text x="138" y="744" font-size="12" fill="#475569">Scoped role for the serverless functions:</text>
  <text x="138" y="762" font-size="12" fill="#475569">mints short-lived DSQL auth token (dsql-signer) + Bedrock invoke</text>

  <!-- engine -> bedrock -->
  <line x1="430" y1="434" x2="330" y2="534" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="300" y="500" font-size="11" fill="#475569">intake: NL → JSON</text>

  <!-- engine -> dsql -->
  <line x1="820" y1="434" x2="845" y2="518" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="852" y="500" font-size="11" fill="#475569">allocate / query (SQL, TLS)</text>

  <!-- IAM -> bedrock (auth) -->
  <line x1="335" y1="700" x2="335" y2="658" stroke="#b45309" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrO)"/>
  <text x="345" y="685" font-size="10.5" fill="#b45309">invoke</text>

  <!-- IAM -> dsql (auth) -->
  <line x1="550" y1="735" x2="600" y2="675" stroke="#b45309" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrO)"/>
  <text x="556" y="712" font-size="10.5" fill="#b45309">DSQL auth token</text>

  <!-- footer -->
  <text x="40" y="862" font-size="12" fill="#64748b">Real-time via 1s polling (no WebSockets). Deterministic seed + barrier-synced surge make the collision reproducible. Reset re-seeds demo state.</text>
</svg>
